<div class="example-large-box">
  <mat-form-field>
    <mat-label>Filter</mat-label>
    <input matInput (keyup)="applyFilter($event)"#input>
  </mat-form-field>
  <section class="example-container mat-elevation-z8" tabindex="0">
    <table mat-table [dataSource]="dataSource">
      <!-- Semitrailer's plate Column -->
      <ng-container matColumnDef="semitrailerPlate" sticky>
        <th mat-header-cell *matHeaderCellDef> Semitrailer's plate </th>
        <td mat-cell *matCellDef="let element"> {{ element.semitrailerPlate }} </td>
      </ng-container>
      <!-- Semitrailer's type Column -->
      <ng-container matColumnDef="semitrailerType">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Semitrailer's type </th>
        <td mat-cell *matCellDef="let row"> {{row.semitrailerType}} </td>
      </ng-container>
      <!-- Semitrailer's servicing validity Column -->
      <ng-container matColumnDef="semitrailerService">
        <th mat-header-cell *matHeaderCellDef> Semitrailer's servicing validity </th>
        <td mat-cell *matCellDef="let element"> {{ element.semitrailerService | date}} </td>
      </ng-container>
      <!-- Semitrailer's insurance validity -->
      <ng-container matColumnDef="semitrailerInsurance">
        <th mat-header-cell *matHeaderCellDef> Semitrailer's insurance validity </th>
        <td mat-cell *matCellDef="let element"> {{ element.semitrailerInsurance | date }} </td>
      </ng-container>
      <!-- Actions Column -->
      <ng-container matColumnDef="action" stickyEnd>
        <th mat-header-cell *matHeaderCellDef aria-label="row actions">&nbsp;</th>
        <td mat-cell *matCellDef="let element">
          <div class="edit-delete-btns">
            <button mat-icon-button (click)="openEditForm(element)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button (click)="deleteSemitrailer(element.id)">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of users"></mat-paginator>
  </section>
</div>
<div class="add-driver-btn">
<button mat-raised-button (click)="openAddSemitrailerForm()">ADD VEHICLE</button>
</div>
